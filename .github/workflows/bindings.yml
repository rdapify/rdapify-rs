name: Bindings

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Node.js binding (napi-rs) ─────────────────────────────────────────────
  nodejs:
    name: Node.js (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: bindings/nodejs
        run: |
          npm install
          napi build --platform --release --target ${{ matrix.target }}

      - name: Upload .node artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-binding-${{ matrix.target }}
          path: bindings/nodejs/*.node

  publish-nodejs:
    name: Publish @rdapify/core to npm
    runs-on: ubuntu-latest
    needs: nodejs

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download all .node artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-binding-*
          path: bindings/nodejs
          merge-multiple: true

      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli

      - name: Generate index.js
        working-directory: bindings/nodejs
        run: |
          npm install
          napi artifacts

      - name: Publish to npm
        working-directory: bindings/nodejs
        run: npm publish --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Python binding (PyO3 + maturin) ──────────────────────────────────────
  python:
    name: Python (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64
          - os: windows-latest
            target: x86_64

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          working-directory: bindings/python
          args: --release --out dist --find-interpreter
          sccache: "true"
          manylinux: auto

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-wheel-${{ matrix.os }}-${{ matrix.target }}
          path: bindings/python/dist

  publish-python:
    name: Publish rdapify to PyPI
    runs-on: ubuntu-latest
    needs: python

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_TOKEN }}
